<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Brand Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div class="admin-layout">

    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <div class="admin-content">

        <div
                th:replace="~{fragments/admin-header ::
header(
'Brand Management',
'Manage tyre brands',
@{/admin/brands/new},
'Add Brand'
)}">


            <a th:href="@{/admin/brands/new}"
               class="btn btn-primary">

                <i class="bi bi-plus-circle"></i>

                Add Brand

            </a>

        </div>

        <div class="card shadow-sm">

            <div class="card-body">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                    <tr>

                        <th>Logo</th>

                        <th>Name</th>

                        <th>Description</th>

                        <th>Status</th>

                        <th>Created</th>

                        <th class="action-column">

                            Action

                        </th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="brand : ${brands}">

                        <!-- Logo -->

                        <td>

                            <img th:if="${brand.logo != null}"
                                 th:src="@{'/uploads/brands/' + ${brand.logo}}"
                                 class="img-thumbnail"
                                 style="width:70px;height:50px;object-fit:contain;">

                            <span th:if="${brand.logo == null}">

                                No Logo

                            </span>

                        </td>

                        <!-- Name -->

                        <td class="fw-bold"
                            th:text="${brand.name}">

                        </td>

                        <!-- Description -->

                        <td class="description-column">

                            <span
                                    th:title="${brand.description}"

                                    th:text="${#strings.length(brand.description)>40 ?

                                    #strings.substring(brand.description,0,40)+'...' :

                                    brand.description}">

                            </span>

                        </td>

                        <!-- Status -->

                        <td>

                            <span class="badge bg-success"
                                  th:if="${brand.active}">

                                Active

                            </span>

                            <span class="badge bg-danger"
                                  th:unless="${brand.active}">

                                Inactive

                            </span>

                        </td>

                        <!-- Created Date -->

                        <td th:text="${#temporals.format(brand.createdAt,'dd-MMM-yyyy')}">

                        </td>

                        <!-- Action -->

                        <td class="action-column">

                            <a th:href="@{'/admin/brands/edit/' + ${brand.id}}"
                               class="btn btn-warning btn-sm me-2"
                               title="Edit">

                                <i class="bi bi-pencil-square"></i>

                            </a>

                            <a th:href="@{'/admin/brands/delete/' + ${brand.id}}"
                               class="btn btn-danger btn-sm"
                               title="Delete"
                               onclick="return confirm('Delete this brand?')">

                                <i class="bi bi-trash"></i>

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
