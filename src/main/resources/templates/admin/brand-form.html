<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Brand Management | Gupta Tyre Shop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet"
        th:href="@{/css/style.css}">

</head>

<body>

<div class="admin-layout">

  <!-- Sidebar -->
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

  <!-- Main Content -->
  <div class="admin-content">

    <div
            th:replace="~{fragments/admin-header ::
header(
'Brand Management',
'Manage tyre brands',
@{/admin/brands/new},
'Add Brand'
)}">
    </div>

    <div class="mb-3">

      <a th:href="@{/admin/brands}"
         class="btn btn-secondary">

        <i class="bi bi-arrow-left-circle"></i>

        Back

      </a>

    </div>

    <div class="alert alert-danger"
         th:if="${error}"
         th:text="${error}">
    </div>

    <!-- Card -->

    <div class="card shadow">

      <div class="card-header bg-primary text-white">

        <h4 class="mb-0">

                    <span th:if="${brand.id == null}">

                        Add New Brand

                    </span>

          <span th:if="${brand.id != null}">

                        Update Brand

                    </span>

        </h4>

      </div>

      <div class="card-body">

        <form th:action="@{/admin/brands/save}"
              th:object="${brand}"
              method="post"
              enctype="multipart/form-data">

          <input type="hidden"
                 th:field="*{id}">

          <!-- Brand Name -->

          <div class="mb-3">

            <label class="form-label fw-semibold">

              Brand Name

            </label>

            <input type="text"
                   class="form-control"
                   th:field="*{name}"
                   placeholder="Enter Brand Name">

          </div>

          <!-- Description -->

          <div class="mb-3">

            <label class="form-label fw-semibold">

              Description

            </label>

            <textarea class="form-control"
                      rows="4"
                      th:field="*{description}"
                      placeholder="Enter Brand Description"></textarea>

          </div>

          <!-- Logo Upload -->

          <div class="mb-3">

            <label class="form-label fw-semibold">

              Brand Logo

            </label>

            <input type="file"
                   class="form-control"
                   name="logoFile"
                   accept=".png,.jpg,.jpeg,.webp">

            <small class="text-muted">

              Supported: PNG, JPG, JPEG, WEBP

            </small>

          </div>

          <!-- Existing Logo -->

          <div class="mb-4"
               th:if="${brand.logo != null}">

            <label class="form-label fw-semibold">

              Current Logo

            </label>

            <br>

            <img th:src="@{'/uploads/brands/' + ${brand.logo}}"
                 class="img-thumbnail"
                 style="height:100px;object-fit:contain;">

          </div>

          <!-- Active -->

          <div class="form-check form-switch mb-4">

            <input class="form-check-input"
                   type="checkbox"
                   th:field="*{active}">

            <label class="form-check-label">

              Active

            </label>

          </div>

          <!-- Buttons -->

          <div class="d-flex gap-2">

            <button class="btn btn-success">

              <i class="bi bi-check-circle"></i>

              Save Brand

            </button>

            <a th:href="@{/admin/brands}"
               class="btn btn-outline-secondary">

              Cancel

            </a>

          </div>

        </form>

      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
