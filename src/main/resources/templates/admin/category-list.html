<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Category Management</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div class="admin-layout">

    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <div class="admin-content">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2 class="fw-bold">

                    Category Management

                </h2>

                <p class="text-muted">

                    Manage tyre categories for your products.

                </p>

            </div>

            <a th:href="@{/admin/categories/new}"
               class="btn btn-primary">

                <i class="bi bi-plus-circle"></i>

                Add Category

            </a>

        </div>

        <div class="card shadow-sm">

            <div class="card-body">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Description</th>

                        <th>Status</th>

                        <th>Created</th>

                        <th class="action-column">
                            Actions
                        </th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="category : ${categories}">

                        <td th:text="${category.id}"></td>

                        <td th:text="${category.name}"></td>

                        <!--<td th:text="${category.description}"></td>-->
                        <td class="description-column">

    <span th:title="${category.description}"
          th:text="${#strings.length(category.description) > 40 ?
          #strings.substring(category.description,0,40)+'...' :
          category.description}">
    </span>

                        </td>

                        <td>

<span class="badge bg-success"
      th:if="${category.active}">

Active

</span>

                            <span class="badge bg-danger"
                                  th:unless="${category.active}">

Inactive

</span>

                        </td>

                        <td th:text="${#temporals.format(category.createdAt,'dd-MMM-yyyy')}">

                        </td>

                        <td class="action-column">

                            <a th:href="@{'/admin/categories/edit/' + ${category.id}}"
                               class="btn btn-warning btn-sm me-2"
                               title="Edit">

                                <i class="bi bi-pencil-square"></i>

                            </a>

                            <a th:href="@{'/admin/categories/delete/' + ${category.id}}"
                               class="btn btn-danger btn-sm"
                               title="Delete"
                               onclick="return confirm('Delete this category?')">

                                <i class="bi bi-trash"></i>

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>

</html>
