<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="header(pageTitle, pageDescription, addUrl, addButtonText)">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold"
                th:text="${pageTitle}">

            </h2>

            <p class="text-muted"
               th:text="${pageDescription}">

            </p>

        </div>

        <a th:href="${addUrl}"
           class="btn btn-primary">

            <i class="bi bi-plus-circle"></i>

            <span th:text="${addButtonText}"></span>

        </a>

    </div>

</div>

</body>

</html>
