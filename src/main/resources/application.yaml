spring:
  application:
    name: gupta-tyre-shop

  datasource:
    url: jdbc:mysql://localhost:3306/gupta_tyre_shop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.MySQLDialect

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${PORT:8080}